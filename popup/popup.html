<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>Focus Nuke</title>
</head>

<body>
  <div class="header">
    <img src="../assets/icon48.png" alt="Focus Nuke Logo" class="logo">
    <h1>Focus Nuke</h1>
    <button id="settingsBtn" class="icon-btn" title="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
        </path>
      </svg>
    </button>
  </div>

  <div class="main-content">
    <button id="nukeBtn" class="nuke-btn">
      <span class="btn-text">Nuke</span>
    </button>
    <p id="statusText" class="status-off">Distractions Active</p>
  </div>

  <div id="settingsPanel" class="settings-panel hidden">
    <h3>Settings</h3>
    <div class="setting-row">
      <span>OLED Dark Mode</span>
      <label class="switch">
        <input type="checkbox" id="oledToggle">
        <span class="slider round"></span>
      </label>
    </div>
    <div class="setting-row">
      <span>Turquoise Accents</span>
      <label class="switch">
        <input type="checkbox" id="accentToggle">
        <span class="slider round"></span>
      </label>
    </div>
    <div class="setting-row">
      <span>Focus Notes</span>
      <label class="switch">
        <input type="checkbox" id="notesToggle">
        <span class="slider round"></span>
      </label>
    </div>
    <div class="setting-row" style="margin-top: 5px; border-top: 1px solid #333; padding-top: 10px;">
      <div style="display:flex; flex-direction:column; gap:2px;">
        <span style="font-weight:bold; color:#ff8a65;">Super Nuke [experimental]</span>
        <span style="font-size:10px; color:#aaa;">Removes titles, descriptions, and all non-essential UI. Compacts
          playlists.</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="superNukeToggle">
        <span class="slider round"></span>
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
